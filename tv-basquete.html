<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SUPERCOPA BASQUETE — TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --maroon:  #6B1515;
  --maroon2: #2a0505;
  --maroon3: #8B1C1C;
  --gold:    #F0A500;
  --gold2:   #FFD060;
  --gold3:   #C87800;
  --txt:     #ffffff;
  --muted:   rgba(255,255,255,.55);
  --card:    rgba(0,0,0,.4);
}

html, body {
  width:100%; height:100%;
  background: var(--maroon2);
  color: var(--txt);
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* ── SPOTLIGHT CANVAS ── */
#spotlightCanvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── BASKETBALL BG LINES ── */
.bball-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  overflow: hidden;
}

.bball-bg svg {
  position: absolute;
  opacity: .06;
}

/* court draw-on animation */
.court-line {
  stroke-dasharray: 2000;
  stroke-dashoffset: 2000;
  animation: drawLine 4s ease forwards;
}
@keyframes drawLine { to { stroke-dashoffset: 0; } }

/* ── PULSING RADIAL BG ── */
.radial-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(240,165,0,.14) 0%, transparent 55%),
    radial-gradient(ellipse 70% 45% at 50% 100%, rgba(107,21,21,.9) 0%, transparent 65%),
    linear-gradient(180deg, #1a0303 0%, #2a0505 35%, #4a0e0e 70%, #6B1515 100%);
  animation: bgPulse 6s ease-in-out infinite;
}
@keyframes bgPulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .85; }
}

/* ── PARTICLES ── */
.particles { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.particle  { position:absolute; border-radius:50%; animation: floatUp linear infinite; }
@keyframes floatUp {
  0%   { transform:translateY(100vh) scale(0); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:.8; }
  100% { transform:translateY(-10vh) scale(1); opacity:0; }
}

/* ── FLASH OVERLAY ── */
#flash-overlay {
  position:fixed; inset:0; z-index:50;
  background: rgba(255,255,255,1);
  pointer-events:none;
  opacity:0;
}

/* ── LAYOUT ── */
.tv-wrap {
  position: relative; z-index: 2;
  width: 100%; height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.tv-header {
  flex-shrink: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.65) 0%, rgba(0,0,0,.2) 100%);
  padding: 18px 24px 12px;
  display: flex; align-items: center; justify-content: space-between;
  animation: fadeInDown .7s ease both;
  border-bottom: 1px solid rgba(240,165,0,.08);
}

.logo-shield {
  display: flex; flex-direction: column; align-items: center;
  gap: 0;
}

.logo-edicao {
  font-size: 9px; font-weight: 700; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
}

.logo-super {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; line-height: .9; color: var(--txt);
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(240,165,0,.2);
}

.logo-bar {
  background: linear-gradient(90deg, var(--gold3), var(--gold), var(--gold2), var(--gold), var(--gold3));
  background-size: 200% auto;
  padding: 2px 14px;
  font-size: 9px; font-weight: 900; letter-spacing: 3px;
  color: var(--maroon2); text-transform: uppercase;
  margin: 2px 0;
  animation: shimmer 3s linear infinite;
  border-radius: 2px;
}

.logo-copa {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; line-height: .9; color: var(--txt);
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(240,165,0,.2);
}

.tv-clock-wrap { text-align: right; }
.tv-clock {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px; color: var(--gold); line-height:1;
  text-shadow: 0 0 30px rgba(240,165,0,.5), 0 0 60px rgba(240,165,0,.2);
  animation: clockGlow 2s ease-in-out infinite;
}
@keyframes clockGlow {
  0%,100% { text-shadow: 0 0 20px rgba(240,165,0,.4); }
  50%      { text-shadow: 0 0 40px rgba(240,165,0,.8), 0 0 80px rgba(240,165,0,.3); }
}
.tv-date  { font-size: 10px; color: var(--muted); letter-spacing: 2px; }

.live-badge {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: rgba(240,165,0,.12); border: 1px solid rgba(240,165,0,.45);
  border-radius: 24px; padding: 8px 16px;
  font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 2px;
  position: relative;
}
.live-badge::before {
  content:'';
  position:absolute; inset:-4px; border-radius:28px;
  border: 1px solid rgba(240,165,0,.25);
  animation: ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100% { transform:scale(1); opacity:.6; }
  50%      { transform:scale(1.08); opacity:0; }
}

.live-badge .dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 10px var(--gold), 0 0 20px rgba(240,165,0,.5);
  animation: blink 1s infinite;
}

/* ── DIVIDER ── */
.gold-line {
  height: 2px; flex-shrink: 0;
  background: linear-gradient(90deg, transparent 0%, var(--gold3) 15%, var(--gold) 40%, var(--gold2) 50%, var(--gold) 60%, var(--gold3) 85%, transparent 100%);
  background-size: 200% auto;
  animation: shimmerLine 3s linear infinite;
}
@keyframes shimmerLine {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* ── SCENE WRAPPER ── */
.scene-wrap { flex:1; position:relative; overflow:hidden; }

.scene {
  position: absolute; inset: 0;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
  opacity: 0; pointer-events: none;
}

.scene.active { opacity:1; pointer-events:auto; animation: slideSceneIn .6s cubic-bezier(.22,.68,0,1.2) both; }
.scene.leaving { animation: slideSceneOut .4s ease forwards; }

@keyframes slideSceneIn  { from{opacity:0;transform:translateY(20px) scale(.97)} to{opacity:1;transform:none} }
@keyframes slideSceneOut { from{opacity:1;transform:none} to{opacity:0;transform:translateY(-20px) scale(.97)} }

/* ── PAINEL ── */
.panel {
  background: rgba(0,0,0,.38);
  border-radius: 18px;
  border: 1px solid rgba(240,165,0,.2);
  overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
}

.panel-head {
  background: linear-gradient(135deg, rgba(107,21,21,.95), rgba(42,5,5,.95));
  border-bottom: 2px solid var(--gold3);
  padding: 11px 18px;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold);
  position: relative; overflow: hidden;
}
.panel-head::after {
  content:''; position:absolute; top:0; left:-120%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  animation: shine 5s ease-in-out infinite;
}
@keyframes shine { 0%{left:-120%} 45%{left:160%} 100%{left:160%} }

.panel-body { padding: 10px 14px; }

/* ── PLACAR AO VIVO ── */
.live-card {
  background: linear-gradient(135deg, rgba(0,0,0,.55), rgba(107,21,21,.35), rgba(0,0,0,.55));
  border-radius: 20px;
  border: 1px solid rgba(240,165,0,.4);
  padding: 20px 18px;
  animation: liveCardGlow 3s ease-in-out infinite;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative; overflow: hidden;
}
.live-card::before {
  content:''; position:absolute; top:0; left:-200%; width:80%; height:100%;
  background: linear-gradient(90deg,transparent,rgba(240,165,0,.05),transparent);
  animation: shine 6s ease-in-out infinite 1s;
}
@keyframes liveCardGlow {
  0%,100% { box-shadow: 0 0 20px rgba(240,165,0,.15), inset 0 0 20px rgba(240,165,0,.03); }
  50%      { box-shadow: 0 0 40px rgba(240,165,0,.35), inset 0 0 30px rgba(240,165,0,.07); }
}

.live-card-label {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase; text-align: center; margin-bottom: 14px;
}

.live-teams {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}

.live-team { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }

.live-team-icon {
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, var(--maroon), var(--maroon3));
  border: 2px solid rgba(240,165,0,.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}

.live-team-name {
  font-size: 16px; font-weight: 800; text-align: center;
  line-height: 1.1; color: var(--txt);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 130px;
}
.live-team-name.winner { color: var(--gold); text-shadow: 0 0 12px rgba(240,165,0,.5); }

.live-score-box { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.live-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 80px; line-height: 1; color: var(--gold2);
  text-shadow: 0 0 30px rgba(240,165,0,.6), 0 0 60px rgba(240,165,0,.3);
  animation: scorePulse 2s ease-in-out infinite;
  min-width: 70px; text-align: center;
}
@keyframes scorePulse {
  0%,100% { text-shadow: 0 0 15px rgba(240,165,0,.4); }
  50%      { text-shadow: 0 0 40px rgba(240,165,0,.9), 0 0 80px rgba(240,165,0,.4); }
}

.live-score-sep { font-family:'Bebas Neue',sans-serif; font-size:40px; color:rgba(240,165,0,.5); }
.live-score-vs  {
  font-family:'Bebas Neue',sans-serif; font-size:36px;
  color:rgba(255,255,255,.3); letter-spacing:5px;
  animation: vsPulse 1.5s ease-in-out infinite;
}
@keyframes vsPulse {
  0%,100% { color:rgba(255,255,255,.3); transform:scale(1); }
  50%      { color:rgba(240,165,0,.6); transform:scale(1.08); }
}

.live-rodada { text-align:center; font-size:10px; color:var(--muted); margin-top:10px; letter-spacing:2px; }

/* ── CLASSIFICAÇÃO ── */
.class-header {
  display: grid; grid-template-columns: 28px 1fr 32px 32px 32px 40px;
  gap: 4px; padding: 5px 8px;
  font-size: 10px; font-weight: 700; color: rgba(240,165,0,.6);
  letter-spacing: 1px; text-transform: uppercase;
  border-bottom: 1px solid rgba(240,165,0,.12); margin-bottom: 4px;
}

.class-row {
  display: grid; grid-template-columns: 28px 1fr 32px 32px 32px 40px;
  gap: 4px; align-items: center; padding: 9px 8px; border-radius: 10px;
  background: rgba(255,255,255,.03); margin-bottom: 4px;
  animation: slideRowIn .5s ease both;
  border-left: 3px solid transparent;
  transition: background .2s;
}
.class-row.p1 {
  background: rgba(240,165,0,.13);
  border-left: 3px solid var(--gold);
  box-shadow: inset 0 0 20px rgba(240,165,0,.05);
}
.class-row.p2 { background:rgba(255,255,255,.06); border-left:3px solid rgba(192,192,192,.5); }
.class-row.p3 { border-left:3px solid rgba(205,127,50,.45); }

@keyframes slideRowIn { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:none} }

.rank-num {
  width:26px; height:26px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800;
}
.r1 { background:var(--gold); color:var(--maroon2); animation:rankPulse 2s infinite; }
.r2 { background:rgba(192,192,192,.7); color:#000; }
.r3 { background:rgba(205,127,50,.7); color:#fff; }
.rn { background:rgba(255,255,255,.1); color:var(--muted); }

.class-name { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.class-num  { text-align:center; font-size:13px; color:var(--muted); }
.class-pts  { text-align:center; font-size:17px; font-weight:800; color:var(--gold); }

/* ── TABELA JOGOS ── */
.jogo-row {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,.25); border-radius: 12px; padding: 10px 12px;
  border-left: 3px solid transparent; margin-bottom: 7px;
  animation: slideRowIn .5s ease both;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
  transition: background .2s;
}
.jogo-row.done { border-left-color: #22c55e; background: rgba(34,197,94,.05); }
.jogo-row.wait { border-left-color: rgba(255,255,255,.08); }

.jogo-hora { font-family:'Bebas Neue',sans-serif; font-size:17px; font-weight:700; color:var(--gold); min-width:44px; }
.jogo-grupo { font-size:10px; color:var(--muted); min-width:60px; text-align:center; background:rgba(240,165,0,.1); border-radius:10px; padding:2px 6px; }
.jogo-team-a { flex:1; font-size:14px; font-weight:700; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.jogo-team-a.w { color:var(--gold); }
.jogo-score { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold2); min-width:70px; text-align:center; white-space:nowrap; }
.jogo-score.vs { font-size:14px; color:var(--muted); letter-spacing:3px; }
.jogo-team-b { flex:1; font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.jogo-team-b.w { color:var(--gold); }

/* ── BRACKET ── */
.bk-scene { display:flex; flex-direction:column; height:100%; gap:10px; }

.bk-tagline { text-align:center; font-size:11px; letter-spacing:6px; color:rgba(240,165,0,.55); text-transform:uppercase; padding:4px 0; }

.bk-row { display:flex; gap:0; align-items:stretch; }

.bk-sf { flex:1; display:flex; flex-direction:column; gap:6px; }

.bk-team-box {
  background: rgba(0,0,0,.45);
  border: 1px solid rgba(240,165,0,.22);
  border-radius: 12px; padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  animation: slideRowIn .5s ease both;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
}
.bk-team-box.winner {
  border-color: rgba(240,165,0,.65);
  background: rgba(240,165,0,.12);
  box-shadow: 0 0 20px rgba(240,165,0,.2);
}

.bk-tname { font-size:15px; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bk-tname.w { color:var(--gold); }
.bk-tscore { font-family:'Bebas Neue',sans-serif; font-size:28px; color:rgba(240,165,0,.5); min-width:36px; text-align:center; }
.bk-tscore.w { color:var(--gold); text-shadow: 0 0 15px rgba(240,165,0,.5); }
.bk-tscore.p { font-size:14px; color:rgba(255,255,255,.2); letter-spacing:2px; }

.bk-connector { width:36px; display:flex; flex-direction:column; justify-content:center; align-items:flex-end; flex-shrink:0; padding-right:0; }
.bk-connector-right { width:36px; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; flex-shrink:0; }

.bk-center { width:180px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; flex-shrink:0; }

.bk-trophy {
  font-size:60px;
  filter:drop-shadow(0 0 20px rgba(240,165,0,.8)) drop-shadow(0 0 40px rgba(240,165,0,.4));
  animation: trophySpin 6s ease-in-out infinite;
  display:block; line-height:1;
}
@keyframes trophySpin {
  0%   { transform:rotateY(0)    scale(1); }
  50%  { transform:rotateY(180deg) scale(1.2); }
  100% { transform:rotateY(360deg) scale(1); }
}

.bk-final-label {
  font-size:9px; font-weight:800; letter-spacing:4px; color:var(--gold);
  text-transform:uppercase; border:1px solid rgba(240,165,0,.4); border-radius:20px; padding:3px 12px;
  animation: finalGlow 2s ease-in-out infinite;
}
@keyframes finalGlow {
  0%,100% { box-shadow: 0 0 0 0 rgba(240,165,0,0); }
  50%      { box-shadow: 0 0 16px 4px rgba(240,165,0,.3); }
}

.bk-final-box {
  background: linear-gradient(135deg,rgba(40,20,0,.95),rgba(80,40,0,.9));
  border: 1px solid rgba(240,165,0,.45); border-radius:10px; padding:8px 12px;
  display:flex; align-items:center; justify-content:space-between; width:100%;
  animation: scaleIn .5s .4s ease both;
  backdrop-filter: blur(8px);
}
.bk-final-name { font-size:13px; font-weight:700; flex:1; color:rgba(255,255,255,.7); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bk-final-name.w { color:var(--gold); }
.bk-final-score { font-family:'Bebas Neue',sans-serif; font-size:24px; color:rgba(240,165,0,.5); }
.bk-final-score.w { color:var(--gold); text-shadow: 0 0 20px rgba(240,165,0,.6); }
.bk-final-score.p { font-size:12px; color:rgba(240,165,0,.25); letter-spacing:2px; }

.camp-banner {
  background: linear-gradient(135deg,rgba(80,40,0,.98),rgba(120,60,0,.95));
  border: 2px solid rgba(240,165,0,.6); border-radius:14px; padding:10px 14px; width:100%;
  text-align:center;
  animation: scaleIn .6s .7s ease both, campBannerGlow 2s infinite;
  box-shadow: 0 0 30px rgba(240,165,0,.2);
}
@keyframes campBannerGlow {
  0%,100% { box-shadow:0 0 20px rgba(240,165,0,.2); }
  50%      { box-shadow:0 0 40px rgba(240,165,0,.5); }
}
.camp-lbl { font-size:9px; letter-spacing:3px; color:rgba(240,165,0,.8); text-transform:uppercase; }
.camp-name {
  font-size:17px; font-weight:900;
  background: linear-gradient(90deg,var(--gold3),var(--gold2),var(--gold),var(--gold2),var(--gold3));
  background-size:200% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 2s linear infinite;
}

/* ── TICKET PRÓXIMO JOGO ── */
@keyframes ticketGlow {
  0%,100% { box-shadow: 0 0 0 0 rgba(240,165,0,0); }
  50%      { box-shadow: 0 0 28px 6px rgba(240,165,0,.3); }
}
@keyframes ticketSlide {
  from { transform:translateY(8px); opacity:.7; }
  to   { transform:translateY(0);   opacity:1; }
}

.ticket-next {
  background: linear-gradient(135deg, rgba(40,10,10,.92), rgba(107,21,21,.55));
  border: 1.5px dashed rgba(240,165,0,.55);
  border-radius: 16px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  animation: ticketGlow 2.5s ease-in-out infinite, ticketSlide .5s ease;
  position: relative; overflow: hidden; margin-bottom: 8px;
  backdrop-filter: blur(8px);
}
.ticket-next::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(240,165,0,.05),transparent);
  animation:shine 3s ease-in-out infinite;
}
.ticket-badge {
  background: rgba(240,165,0,.14); border: 1px solid rgba(240,165,0,.35);
  border-radius: 8px; padding: 6px 10px;
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  color: var(--gold); text-transform: uppercase;
  flex-shrink: 0; text-align: center; line-height: 1.4;
}
.ticket-teams { flex:1; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.ticket-team { font-size:18px; font-weight:800; color:var(--txt); }
.ticket-vs {
  font-size:11px; font-weight:700; letter-spacing:4px; color:var(--muted);
  background:rgba(255,255,255,.06); border-radius:20px; padding:3px 10px;
}
.ticket-hora {
  font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); flex-shrink:0;
  animation:scorePulse 3s ease-in-out infinite;
}

/* ── SCENE CAMPEÃO ── */
#scene-campeao {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; padding: 32px 24px;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(80,40,0,.6) 0%, transparent 70%);
}

.confetti-canvas { position:fixed; inset:0; width:100vw; height:100vh; pointer-events:none; z-index:0; }

.camp-scene-content {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  position: relative; z-index: 1;
}

.camp-trophy-big {
  font-size: 120px; line-height: 1;
  filter: drop-shadow(0 0 30px rgba(240,165,0,.9)) drop-shadow(0 0 60px rgba(240,165,0,.5));
  animation: trophyBounce 1.8s ease-in-out infinite;
}
@keyframes trophyBounce {
  0%,100% { transform: translateY(0) scale(1); }
  30%      { transform: translateY(-20px) scale(1.12); }

<script>

// ── CONFIG ─────────────────────────────────────────
var SHEET_ID = '1S3rUVU18W64c4okkxGOYnSLtW-aSyo47l3tos7u-8j0';
var API_KEY  = 'AIzaSyBzIsc4TKy_he2P8PcOgOzs8Eor3EVHBzw';
var REFRESH  = 30;

var HORARIOS = {
  'A-1':'08:00','A-2':'09:30','A-3':'11:00',
  'B-1':'08:45','B-2':'10:15','B-3':'11:45',
  'SF1':'14:00','SF2':'15:30','Final':'17:00'
};

var appData = { grupos:[], matamata:[] };
var countdown = REFRESH;
var currentScene = 0;
var scenes = [];

function apiUrl(range){
  return 'https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(range)+'?key='+API_KEY;
}
function gc(rows,r,c){ return (rows[r]&&rows[r][c])?rows[r][c].toString().trim():''; }
function pad(v){ return String(v).padStart(2,'0'); }

// ── CLOCK ──────────────────────────────────────────
function updateClock(){
  var n=new Date();
  document.getElementById('clockTime').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
  var dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  document.getElementById('clockDate').textContent=dias[n.getDay()]+' '+pad(n.getDate())+'/'+pad(n.getMonth()+1);
}
setInterval(updateClock,1000); updateClock();

// ── MODE ───────────────────────────────────────────
function getMode(){
  var m=new URLSearchParams(window.location.search).get('modo');
  return m==='matamata' ? 'matamata' : 'grupos';
}

// ── SCENES ─────────────────────────────────────────
function buildScenes(){
  var mode=getMode();
  scenes = mode==='matamata' ? ['scene-matamata'] : ['scene-placar','scene-tabela'];
  var el=document.getElementById('sceneDots');
  el.innerHTML=scenes.length>1?scenes.map(function(_,i){ return '<div class="scene-dot'+(i===0?' active':'')+'"></div>'; }).join(''):'';
}

function buildDots(){
  var el=document.getElementById('sceneDots');
  el.innerHTML=scenes.length>1?scenes.map(function(_,i){ return '<div class="scene-dot'+(i===currentScene?' active':'')+'"></div>'; }).join(''):'';
}

function showScene(idx){
  // Flash transition
  var flash = document.getElementById('flash-overlay');
  flash.style.transition = 'none';
  flash.style.opacity = '0.3';
  setTimeout(function(){ flash.style.transition = 'opacity .25s'; flash.style.opacity = '0'; }, 50);

  var prev=document.querySelector('.scene.active');
  if(prev){ prev.classList.add('leaving'); prev.classList.remove('active'); setTimeout(function(){prev.classList.remove('leaving');},550); }
  currentScene=idx;
  var next=document.getElementById(scenes[idx]);
  if(next) next.classList.add('active');
  document.querySelectorAll('.scene-dot').forEach(function(d,i){d.classList.toggle('active',i===idx);});

  // Animate scores when showing placar scene
  if(scenes[idx]==='scene-placar'){
    setTimeout(animateScores, 100);
  }
}

setInterval(function(){ showScene((currentScene+1)%scenes.length); }, 20000);

// ── COUNTDOWN ──────────────────────────────────────
setInterval(function(){
  countdown--;
  if(countdown<=0){ countdown=REFRESH; loadData(); }
  document.getElementById('countLbl').textContent=countdown;
  document.getElementById('progFill').style.width=(countdown/REFRESH*100)+'%';
},1000);

// ── LOAD ───────────────────────────────────────────
function loadData(){
  Promise.all([
    fetch(apiUrl("'Fase de Grupos'!A1:S15")).then(function(r){return r.json();}),
    fetch(apiUrl("'Mata-Mata'!A1:O22")).then(function(r){return r.json();})
  ]).then(function(res){
    var gRows=res[0].values||[];
    var mRows=res[1].values||[];

    appData.grupos=[];
    var cfgs=[{grupo:'A',off:0},{grupo:'B',off:10}];
    cfgs.forEach(function(c){
      [4,5,6].forEach(function(rIdx,i){
        var ea=gc(gRows,rIdx,1+c.off), eb=gc(gRows,rIdx,6+c.off);
        if(!ea&&!eb) return;
        var pA=gc(gRows,rIdx,3+c.off), pB=gc(gRows,rIdx,5+c.off);
        var ok=pA!==''&&pB!=='';
        appData.grupos.push({
          grupo:c.grupo, rodada:i+1, key:c.grupo+'-'+(i+1),
          horario:HORARIOS[c.grupo+'-'+(i+1)]||'--:--',
          equipeA:ea, equipeB:eb,
          ptsA:ok?parseInt(pA)||0:null,
          ptsB:ok?parseInt(pB)||0:null,
          status:ok?'done':'wait'
        });
      });
    });

    appData.matamata=[];
    [[3,'SF1'],[8,'SF2'],[14,'Final']].forEach(function(cfg){
      var rIdx=cfg[0], key=cfg[1];
      var ea=gc(mRows,rIdx,1), eb=gc(mRows,rIdx,7);
      var pA=gc(mRows,rIdx+1,1), pB=gc(mRows,rIdx+1,7);
      var ok=pA!==''&&pB!=='';
      appData.matamata.push({ key:key, fase:key==='Final'?'Grande Final':key.replace('SF','Semifinal '), horario:HORARIOS[key]||'', equipeA:ea||'A definir', equipeB:eb||'A definir', ptsA:ok?parseInt(pA)||0:null, ptsB:ok?parseInt(pB)||0:null });
    });

    renderAll();
    document.getElementById('loading').classList.add('hidden');
    var n=new Date();
    document.getElementById('lastUpdate').textContent='Atualizado '+pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  }).catch(function(e){ console.warn(e); });
}

// ── CLASSIFICAÇÃO ──────────────────────────────────
function calcClassif(grupo){
  var times={};
  appData.grupos.filter(function(j){return j.grupo===grupo;}).forEach(function(j){
    [j.equipeA,j.equipeB].forEach(function(t){ if(t&&!times[t]) times[t]={nome:t,j:0,v:0,e:0,d:0,gp:0,gc:0,pts:0}; });
    if(j.status!=='done'||j.ptsA===null) return;
    var a=j.ptsA,b=j.ptsB;
    var tA=times[j.equipeA],tB=times[j.equipeB];
    if(!tA||!tB) return;
    tA.j++;tB.j++;tA.gp+=a;tA.gc+=b;tB.gp+=b;tB.gc+=a;
    if(a>b){tA.pts+=2;tA.v++;tB.d++;}
    else if(a<b){tB.pts+=2;tB.v++;tA.d++;}
    else{tA.pts++;tA.e++;tB.pts++;tB.e++;}
  });
  return Object.values(times).sort(function(a,b){return b.pts-a.pts||b.gp-a.gp-b.gc+a.gc;});
}

function renderClassif(grupo,id){
  var cl=calcClassif(grupo);
  var rk=['r1','r2','r3','rn','rn'], pc=['p1','p2','p3','',''];
  var html='<div class="class-header"><div>#</div><div>Equipe</div><div style="text-align:center">J</div><div style="text-align:center">V</div><div style="text-align:center">D</div><div style="text-align:center">Pts</div></div>';
  cl.forEach(function(t,i){
    html+='<div class="class-row '+pc[i]+'" style="animation-delay:'+(i*.1)+'s">'+
      '<div><div class="rank-num '+rk[i]+'">'+(i+1)+'</div></div>'+
      '<div class="class-name">'+t.nome+'</div>'+
      '<div class="class-num">'+t.j+'</div>'+
      '<div class="class-num">'+t.v+'</div>'+
      '<div class="class-num">'+t.d+'</div>'+
      '<div class="class-pts">'+t.pts+'</div>'+
    '</div>';
  });
  document.getElementById(id).innerHTML=html||'<div style="color:var(--muted);text-align:center;padding:12px;">Aguardando...</div>';
}

// ── PLACAR DESTAQUE ────────────────────────────────
function renderLiveCard(){
  var done=appData.grupos.filter(function(j){return j.status==='done';});

  var el=document.getElementById('liveCardWrap');

  '</div>';

  // Animate scores after render
  setTimeout(animateScores, 50);
}

// ── TABELA JOGOS ────────────────────────────────────
function renderTabela(){
  var nextIdx = appData.grupos.findIndex(function(j){ return j.status !== 'done'; });
  var html = appData.grupos.map(function(j,i){
    var ok = j.status === 'done';
    var vA = ok && j.ptsA > j.ptsB, vB = ok && j.ptsB > j.ptsA;

          '<div class="ticket-team">'+j.equipeA+'</div>'+
          '<div class="ticket-vs">VS</div>'+
          '<div class="ticket-team">'+j.equipeB+'</div>'+
        '</div>'+
        '<div class="ticket-hora">'+j.horario+'</div>'+
      '</div>';

    return '<div class="jogo-row '+(ok?'done':'wait')+'" style="animation-delay:'+(i*.07)+'s">'+

      '<div class="jogo-team-a'+(vA?' w':'')+'">'+j.equipeA+'</div>'+

    '</div>';
  }).join('');
  document.getElementById('tabelaJogos').innerHTML=html||'<div style="color:var(--muted);text-align:center;padding:20px;">Aguardando dados...</div>';
}

// ── MATA-MATA BRACKET ────────────────────────────────
function renderMataMata(){
  var mm=appData.matamata;
  if(!mm.length){ document.getElementById('mmPanel').innerHTML='<div style="color:var(--muted);text-align:center;padding:40px;">Aguardando...</div>'; return; }
  var sf1=mm[0]||{}, sf2=mm[1]||{}, fin=mm[2]||{};

  function v1A(){ return sf1.ptsA!==null&&sf1.ptsB!==null&&sf1.ptsA>sf1.ptsB; }
  function v1B(){ return sf1.ptsA!==null&&sf1.ptsB!==null&&sf1.ptsB>sf1.ptsA; }
  function v2A(){ return sf2.ptsA!==null&&sf2.ptsB!==null&&sf2.ptsA>sf2.ptsB; }
  function v2B(){ return sf2.ptsA!==null&&sf2.ptsB!==null&&sf2.ptsB>sf2.ptsA; }
  function vfA(){ return fin.ptsA!==null&&fin.ptsB!==null&&fin.ptsA>fin.ptsB; }
  function vfB(){ return fin.ptsA!==null&&fin.ptsB!==null&&fin.ptsB>fin.ptsA; }
  var temCamp=fin.ptsA!==null&&fin.ptsB!==null;
  var camp=temCamp?(fin.ptsA>fin.ptsB?fin.equipeA:fin.equipeB):'';

  function sc(v,w){ return v!==null?String(v):'–'; }

  var html='<div class="bk-scene">'+
    '<div class="bk-tagline">A GLÓRIA ETERNA · '+new Date().getFullYear()+'</div>'+

    // Layout horizontal: SF1 | centro | SF2
    '<div style="display:flex;align-items:center;flex:1;gap:0;">'+

    // SF1

// ── SPOTLIGHT CANVAS ───────────────────────────────
function initSpotlights() {
  var canvas = document.getElementById('spotlightCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var ctx = canvas.getContext('2d');
  var spots = [
    { angle: 0,    speed: 0.003,  x: 0.2 },
    { angle: 2.1,  speed: -0.002, x: 0.5 },
    { angle: 4.2,  speed: 0.0025, x: 0.8 }
  ];
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    spots.forEach(function(s) {
      s.angle += s.speed;
      var cx = canvas.width * s.x;
      var cy = -30;
      var tx = cx + Math.sin(s.angle) * 300;
      var ty = canvas.height * 0.85;
      var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, canvas.height * 1.1);
      grad.addColorStop(0, 'rgba(240,165,0,.07)');
      grad.addColorStop(0.4, 'rgba(240,165,0,.03)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(tx - 120, ty);
      ctx.lineTo(tx + 120, ty);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize', function(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

// ── SCORE COUNTER ANIMATION ────────────────────────
function animateScores() {
  document.querySelectorAll('.score-anim').forEach(function(el) {
    var target = parseInt(el.getAttribute('data-val')) || 0;
    var current = 0;
    var duration = 600;
    var steps = 20;
    var step = target / steps;
    var interval = duration / steps;
    var timer = setInterval(function() {
      current = Math.min(current + step, target);
      el.textContent = Math.round(current);
      if (current >= target) clearInterval(timer);
    }, interval);
  });
}

// ── CONFETES ───────────────────────────────────────
var confettiRunning = false;
function startConfetti(){
  if(confettiRunning) return;
  confettiRunning = true;
  var canvas = document.getElementById('confettiCanvas');
  var ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  var pieces = [];
  var colors = ['#F0A500','#FFD060','#C87800','#ffffff','#6B1515','#ffe066','#ff6b35','#ffd700'];
  for(var i=0;i<140;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      w: Math.random()*10+5, h: Math.random()*6+3,
      color: colors[Math.floor(Math.random()*colors.length)],
      speed: Math.random()*3+1.5,
      angle: Math.random()*360,
      spin:  (Math.random()-.5)*4,
      drift: (Math.random()-.5)*1.5
    });
  }

  function draw(){
    if(!confettiRunning) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(function(p){
      ctx.save();
      ctx.translate(p.x+p.w/2, p.y+p.h/2);
      ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.85;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.y     += p.speed;
      p.x     += p.drift;
      p.angle += p.spin;
      if(p.y > canvas.height){ p.y = -10; p.x = Math.random()*canvas.width; }
    });
    requestAnimationFrame(draw);
  }
  draw();
}
